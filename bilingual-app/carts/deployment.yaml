apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  namespace: carts
  labels:
    app: carts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      serviceAccountName: carts
      containers:
        - name: carts
          image: public.ecr.aws/aws-containers/retail-store-sample-cart:0.8.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
