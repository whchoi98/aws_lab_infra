AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECS EC2 (Graviton ARM64) Retail Store Sample App on DMZ VPC.
  UI exposed via ALB + CloudFront, backend via Cloud Map service discovery.

Parameters:
  DMZVPCStackName:
    Type: String
    Default: DMZVPC

  InstanceType:
    Type: String
    Default: t4g.large
    AllowedValues: [t4g.medium, t4g.large, t4g.xlarge, m7g.large, m7g.xlarge]

  DesiredCapacity:
    Type: Number
    Default: 3
    MinValue: 2
    MaxValue: 10

  AppImage:
    Type: String
    Default: base
    AllowedValues: [base, bilingual]

  BillingualEcrUri:
    Type: String
    Default: ""

Conditions:
  UseBilingual: !Equals [!Ref AppImage, bilingual]

Resources:
  #========================================
  # ECS Cluster
  #========================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: lab-shop-ecs
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: lab-shop-ecs
        - Key: Environment
          Value: lab
        - Key: Project
          Value: aws-lab-infra
        - Key: ManagedBy
          Value: cloudformation

  #========================================
  # EC2 Instance Profile + Role
  #========================================
  ECSInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-ecs-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Environment
          Value: lab

  ECSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ECSInstanceRole

  #========================================
  # Launch Template (Graviton ARM64 + ECS Optimized AMI)
  #========================================
  ECSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: lab-ecs-lt
      LaunchTemplateData:
        ImageId: !Sub "resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/arm64/recommended/image_id"
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt ECSInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref ECSSecurityGroup
          - !Ref ECSSecurityGroupSelfRef
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            cat >> /etc/ecs/ecs.config <<EOF
            ECS_CLUSTER=${ECSCluster}
            ECS_ENABLE_CONTAINER_METADATA=true
            ECS_CONTAINER_INSTANCE_TAGS={"Environment":"lab","Project":"aws-lab-infra"}
            EOF
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: lab-ecs-node
              - Key: Environment
                Value: lab
              - Key: Project
                Value: aws-lab-infra
              - Key: ManagedBy
                Value: cloudformation
        Monitoring:
          Enabled: true

  #========================================
  # Auto Scaling Group
  #========================================
  ECSASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: lab-ecs-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref ECSLaunchTemplate
        Version: !GetAtt ECSLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: !Ref DesiredCapacity
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${DMZVPCStackName}-Private-Subnet-A"
        - Fn::ImportValue: !Sub "${DMZVPCStackName}-Private-Subnet-B"
      Tags:
        - Key: Name
          Value: lab-ecs-node
          PropagateAtLaunch: true
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MaxBatchSize: 1
        MinInstancesInService: 1

  #========================================
  # Capacity Provider
  #========================================
  ECSCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: lab-ecs-cp
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Ref ECSASG
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 80
        ManagedTerminationProtection: DISABLED

  ClusterCPAssociation:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - !Ref ECSCapacityProvider
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1

  #========================================
  # Cloud Map Namespace (Service Discovery)
  #========================================
  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: lab-shop.local
      Vpc:
        Fn::ImportValue: !Sub "${DMZVPCStackName}-VPC-ID"

  #========================================
  # IAM Roles (Task)
  #========================================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-ecs-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-ecs-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: xray-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  #========================================
  # Security Groups
  #========================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS Shop ALB SG
      GroupName: lab-ecs-alb-sg
      VpcId:
        Fn::ImportValue: !Sub "${DMZVPCStackName}-VPC-ID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP (restricted to CloudFront by deploy script)
      Tags:
        - Key: Name
          Value: lab-ecs-alb-sg

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS EC2 Instances SG
      GroupName: lab-ecs-instances-sg
      VpcId:
        Fn::ImportValue: !Sub "${DMZVPCStackName}-VPC-ID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 32768
          ToPort: 65535
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Dynamic ports from ALB
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: App port from ALB
      Tags:
        - Key: Name
          Value: lab-ecs-instances-sg

  ECSSecurityGroupSelfRef:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS inter-service SG
      GroupName: lab-ecs-self-sg
      VpcId:
        Fn::ImportValue: !Sub "${DMZVPCStackName}-VPC-ID"

  ECSSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ECSSecurityGroupSelfRef
      IpProtocol: -1
      SourceSecurityGroupId: !Ref ECSSecurityGroupSelfRef

  #========================================
  # ALB
  #========================================
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: lab-ecs-shop-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub "${DMZVPCStackName}-Public-Subnet-A"
        - Fn::ImportValue: !Sub "${DMZVPCStackName}-Public-Subnet-B"
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: lab-ecs-shop-alb
        - Key: Environment
          Value: lab

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultAction:
        - Type: forward
          TargetGroupArn: !Ref UITargetGroup

  UITargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: lab-ecs-ui-tg
      Port: 8080
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${DMZVPCStackName}-VPC-ID"
      TargetType: instance
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: lab-ecs-ui-tg

  #========================================
  # CloudWatch Log Groups
  #========================================
  UILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/lab-shop/ui
      RetentionInDays: 7

  CatalogLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/lab-shop/catalog
      RetentionInDays: 7

  CartsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/lab-shop/carts
      RetentionInDays: 7

  CheckoutLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/lab-shop/checkout
      RetentionInDays: 7

  OrdersLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/lab-shop/orders
      RetentionInDays: 7

  #========================================
  # Cloud Map Services
  #========================================
  CatalogDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: catalog
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10

  CartsDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: carts
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10

  CheckoutDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: checkout
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10

  OrdersDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: orders
      NamespaceId: !Ref ServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10

  #========================================
  # Task Definitions (bridge network for EC2)
  #========================================
  UITaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lab-shop-ui
      NetworkMode: bridge
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ui
          Essential: true
          Image: !If
            - UseBilingual
            - !Ref BillingualEcrUri
            - "public.ecr.aws/aws-containers/retail-store-sample-ui:1.2.1"
          Memory: 1024
          Cpu: 256
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: RETAIL_UI_ENDPOINTS_CATALOG
              Value: http://catalog.lab-shop.local:8080
            - Name: RETAIL_UI_ENDPOINTS_CARTS
              Value: http://carts.lab-shop.local:8080
            - Name: RETAIL_UI_ENDPOINTS_ORDERS
              Value: http://orders.lab-shop.local:8080
            - Name: RETAIL_UI_ENDPOINTS_CHECKOUT
              Value: http://checkout.lab-shop.local:8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref UILogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ui

  CatalogTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lab-shop-catalog
      NetworkMode: bridge
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: catalog
          Essential: true
          Image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.2.1"
          Memory: 512
          Cpu: 256
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: RETAIL_CATALOG_PERSISTENCE_PROVIDER
              Value: mysql
            - Name: RETAIL_CATALOG_PERSISTENCE_ENDPOINT
              Value: "localhost:3306"
            - Name: RETAIL_CATALOG_PERSISTENCE_DB_NAME
              Value: catalog
            - Name: RETAIL_CATALOG_PERSISTENCE_USER
              Value: catalog
            - Name: RETAIL_CATALOG_PERSISTENCE_PASSWORD
              Value: dYmNfWV4uEvTzoFu
          Links:
            - mysql
          DependsOn:
            - ContainerName: mysql
              Condition: START
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CatalogLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: catalog
        - Name: mysql
          Essential: true
          Image: "public.ecr.aws/docker/library/mysql:8.0"
          Memory: 512
          Cpu: 128
          Environment:
            - Name: MYSQL_ROOT_PASSWORD
              Value: dYmNfWV4uEvTzoFu
            - Name: MYSQL_DATABASE
              Value: catalog
            - Name: MYSQL_USER
              Value: catalog
            - Name: MYSQL_PASSWORD
              Value: dYmNfWV4uEvTzoFu
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CatalogLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: mysql

  CartsTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lab-shop-carts
      NetworkMode: bridge
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: carts
          Essential: true
          Image: "public.ecr.aws/aws-containers/retail-store-sample-cart:1.2.1"
          Memory: 512
          Cpu: 256
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: RETAIL_CART_PERSISTENCE_PROVIDER
              Value: dynamodb
            - Name: RETAIL_CART_PERSISTENCE_DYNAMODB_TABLE_NAME
              Value: Items
            - Name: RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE
              Value: "true"
            - Name: AWS_ACCESS_KEY_ID
              Value: key
            - Name: AWS_SECRET_ACCESS_KEY
              Value: secret
            - Name: RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT
              Value: "http://localhost:8000"
          Links:
            - dynamodb-local
          DependsOn:
            - ContainerName: dynamodb-local
              Condition: START
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CartsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: carts
        - Name: dynamodb-local
          Essential: true
          Image: "amazon/dynamodb-local:2.0.0"
          Memory: 256
          Cpu: 128
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CartsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: dynamodb

  CheckoutTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lab-shop-checkout
      NetworkMode: bridge
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: checkout
          Essential: true
          Image: "public.ecr.aws/aws-containers/retail-store-sample-checkout:1.2.1"
          Memory: 512
          Cpu: 256
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
              Value: redis
            - Name: RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL
              Value: "redis://localhost:6379"
            - Name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
              Value: http://orders.lab-shop.local:8080
          Links:
            - redis
          DependsOn:
            - ContainerName: redis
              Condition: START
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CheckoutLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: checkout
        - Name: redis
          Essential: true
          Image: "public.ecr.aws/docker/library/redis:7-alpine"
          Memory: 256
          Cpu: 128
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CheckoutLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: redis

  OrdersTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lab-shop-orders
      NetworkMode: bridge
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: orders
          Essential: true
          Image: "public.ecr.aws/aws-containers/retail-store-sample-orders:1.2.1"
          Memory: 512
          Cpu: 256
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
              Value: postgres
            - Name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
              Value: "localhost:5432"
            - Name: RETAIL_ORDERS_PERSISTENCE_NAME
              Value: orders
            - Name: RETAIL_ORDERS_PERSISTENCE_USERNAME
              Value: orders
            - Name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
              Value: 3z6sGLhGunfn0xZc
          Links:
            - postgresql
          DependsOn:
            - ContainerName: postgresql
              Condition: START
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrdersLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: orders
        - Name: postgresql
          Essential: true
          Image: "public.ecr.aws/docker/library/postgres:16-alpine"
          Memory: 256
          Cpu: 128
          Environment:
            - Name: POSTGRES_DB
              Value: orders
            - Name: POSTGRES_USER
              Value: orders
            - Name: POSTGRES_PASSWORD
              Value: 3z6sGLhGunfn0xZc
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrdersLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: postgresql

  #========================================
  # ECS Services
  #========================================
  UIService:
    Type: AWS::ECS::Service
    DependsOn:
      - ALBListener
      - ClusterCPAssociation
    Properties:
      ServiceName: ui
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref UITaskDef
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1
      LoadBalancers:
        - ContainerName: ui
          ContainerPort: 8080
          TargetGroupArn: !Ref UITargetGroup
      PlacementStrategies:
        - Type: spread
          Field: attribute:ecs.availability-zone
      Tags:
        - Key: Name
          Value: lab-ecs-ui

  CatalogService:
    Type: AWS::ECS::Service
    DependsOn: ClusterCPAssociation
    Properties:
      ServiceName: catalog
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref CatalogTaskDef
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1
      ServiceRegistries:
        - RegistryArn: !GetAtt CatalogDiscovery.Arn
          ContainerName: catalog
          ContainerPort: 8080
      PlacementStrategies:
        - Type: spread
          Field: attribute:ecs.availability-zone

  CartsService:
    Type: AWS::ECS::Service
    DependsOn: ClusterCPAssociation
    Properties:
      ServiceName: carts
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref CartsTaskDef
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1
      ServiceRegistries:
        - RegistryArn: !GetAtt CartsDiscovery.Arn
          ContainerName: carts
          ContainerPort: 8080
      PlacementStrategies:
        - Type: spread
          Field: attribute:ecs.availability-zone

  CheckoutService:
    Type: AWS::ECS::Service
    DependsOn: ClusterCPAssociation
    Properties:
      ServiceName: checkout
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref CheckoutTaskDef
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1
      ServiceRegistries:
        - RegistryArn: !GetAtt CheckoutDiscovery.Arn
          ContainerName: checkout
          ContainerPort: 8080
      PlacementStrategies:
        - Type: spread
          Field: attribute:ecs.availability-zone

  OrdersService:
    Type: AWS::ECS::Service
    DependsOn: ClusterCPAssociation
    Properties:
      ServiceName: orders
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref OrdersTaskDef
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: !Ref ECSCapacityProvider
          Weight: 1
      ServiceRegistries:
        - RegistryArn: !GetAtt OrdersDiscovery.Arn
          ContainerName: orders
          ContainerPort: 8080
      PlacementStrategies:
        - Type: spread
          Field: attribute:ecs.availability-zone

#========================================
# Outputs
#========================================
Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-Cluster"

  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALB-DNS"

  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ALB-SG"

  ALBURL:
    Value: !Sub "http://${ALB.DNSName}"
